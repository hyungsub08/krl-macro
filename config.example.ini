[account]
# 회원번호(8자리), 전화번호(010-xxxx-xxxx), 또는 이메일
id = 010-1234-5678
pw = your_password

[train]
# 출발역
dep = 서울
# 도착역
arr = 부산
# 출발 날짜 (yyyyMMdd)
date = 20260401
# 출발 시간 (hhmmss) - 이 시간 이후 열차 검색
time = 060000

# 열차 종류: ALL, KTX, SAEMAEUL, MUGUNGHWA, ITX_CHEONGCHUN, NURIRO
train_type = KTX

# 좌석 옵션: GENERAL_FIRST, GENERAL_ONLY, SPECIAL_FIRST, SPECIAL_ONLY
seat_option = GENERAL_FIRST

[passengers]
# 승객 수
adult = 1
child = 0
senior = 0

[macro]
# 조회 간격 (초)
interval = 1.0
# 최대 시도 횟수 (0 = 무제한)
max_attempts = 0
# 특정 열차번호만 예매 (콤마 구분, 비우면 전체)
# 예: 001,003,051
train_numbers =
